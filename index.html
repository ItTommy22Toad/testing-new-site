<!DOCTYPE html>
<html>
<head>
  <title>Home</title>


  <style>
  .controls {
    display: flex;
    gap: 8px;
  }

  .controls button {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: none;
    background: #ff0000;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  .controls button:hover {
    background: #cc0000;
    transform: scale(1.1);
  }
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: Arial;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
    }

    .button-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    button {
      padding: 15px;
      border-radius: 8px;
      border: none;
      background: #1f1f1f;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: red;
      transform: scale(1.05);
    }

    /* POPUP */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    #popup {
      background: #2e0101;
      padding: 25px;
      border-radius: 12px;
      border: 3px solid red;
      max-width: 600px;
      text-align: center;
    }

    #popup button {
      margin-top: 20px;
      width: 100%;
      background: red;
    }

    /* GAME OVERLAY */
    #gameOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      display: none;
      flex-direction: column;
      z-index: 9999;
    }

    #topBar {
      height: 50px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px;
    }

    #topBar button {
      background: red;
      padding: 8px 12px;
    }

    #gameFrame {
      flex: 1;
      border: none;
      width: 100%;
    }

    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
    }
  </style>
</head>

<body>

</div>
